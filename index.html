<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WebGL 3D 产品官网</title>

<style>
body {
margin: 0;
overflow-x: hidden;
font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
background: #05060a;
color: white;
}

/* WebGL canvas */
canvas {
position: fixed;
top: 0;
left: 0;
z-index: 0;
}

/* 页面层 */
.section {
position: relative;
z-index: 2;
padding: 120px 10%;
}

/* HERO */
.hero {
height: 100vh;
display: flex;
align-items: center;
justify-content: space-between;
}

.hero h1 {
font-size: 54px;
background: linear-gradient(90deg, #38bdf8, #a78bfa);
-webkit-background-clip: text;
color: transparent;
}

.hero p {
max-width: 520px;
color: #cbd5e1;
line-height: 1.6;
}

.btn {
margin-top: 20px;
padding: 12px 24px;
border-radius: 10px;
border: none;
background: #3b82f6;
color: white;
cursor: pointer;
transition: 0.3s;
}

.btn:hover {
transform: scale(1.05);
}

/* 产品区 */
.grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
gap: 20px;
}

.card {
background: rgba(255,255,255,0.06);
border: 1px solid rgba(255,255,255,0.1);
padding: 20px;
border-radius: 16px;
backdrop-filter: blur(10px);
transition: 0.3s;
}

.card:hover {
transform: translateY(-10px);
}

/* 页面切换 */
.transition {
position: fixed;
inset: 0;
background: black;
z-index: 10;
transform: scaleY(0);
transform-origin: top;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="transition" id="transition"></div>

<div class="section hero">
<div>
<h1>下一代 3D Web 产品体验</h1>
<p>
Three.js + WebGL Shader + 动态粒子系统构建的沉浸式官网体验。
适用于 AI 产品 / SaaS / 技术品牌展示。
</p>
<button class="btn" onclick="transitionPage()">进入产品</button>
</div>
</div>

<div class="section">
<h2>产品能力展示</h2>
<div class="grid">
<div class="card">⚡ AI 实时生成引擎</div>
<div class="card">🌌 3D 空间交互界面</div>
<div class="card">🔐 安全 API 网关</div>
<div class="card">📡 实时数据流处理</div>
</div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth / window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
canvas: document.querySelector("#bg"),
alpha: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
camera.position.z = 5;

/* 粒子 */
const geometry = new THREE.BufferGeometry();
const count = 5000;
const positions = new Float32Array(count * 3);

for (let i = 0; i < count * 3; i++) {
positions[i] = (Math.random() - 0.5) * 10;
}

geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

const material = new THREE.PointsMaterial({
size: 0.01,
color: 0x60a5fa
});

const points = new THREE.Points(geometry, material);
scene.add(points);

/* 动画 */
function animate() {
requestAnimationFrame(animate);
points.rotation.y += 0.0008;
points.rotation.x += 0.0003;
renderer.render(scene, camera);
}
animate();

/* 鼠标互动 */
document.addEventListener("mousemove", (e) => {
const x = (e.clientX / window.innerWidth - 0.5) * 0.5;
const y = (e.clientY / window.innerHeight - 0.5) * 0.5;

camera.position.x += (x - camera.position.x) * 0.05;
camera.position.y += (-y - camera.position.y) * 0.05;
camera.lookAt(scene.position);
});

/* 切换动画 */
function transitionPage() {
const t = document.getElementById("transition");
t.style.transition = "transform 0.6s ease";
t.style.transform = "scaleY(1)";
setTimeout(() => {
t.style.transformOrigin = "bottom";
t.style.transform = "scaleY(0)";
}, 700);
}

/* resize */
window.addEventListener("resize", () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
