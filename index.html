<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Orbital Space Station HUD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #020411, #000);
  font-family: Arial, sans-serif;
  color: #b6f0ff;
}

/* 🌌 星空背景 */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://upload.wikimedia.org/wikipedia/commons/0/02/Snow_stars_space.jpg');
  background-size: cover;
  opacity: 0.25;
  animation: drift 120s linear infinite;
}

@keyframes drift {
  from { transform: translateY(0px); }
  to { transform: translateY(-200px); }
}

/* 🛰️ 主空间站 */
.station {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 220px;
  height: 220px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, #1df2ff33, #000);
  box-shadow: 0 0 80px #1df2ff55;
  animation: rotate 18s linear infinite;
}

@keyframes rotate {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* 🧭 HUD面板 */
.panel {
  position: absolute;
  width: 260px;
  padding: 16px;
  background: rgba(10, 20, 40, 0.5);
  border: 1px solid #1df2ff55;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 30px #1df2ff22;
}

.left { top: 80px; left: 40px; }
.right { top: 80px; right: 40px; }
.bottom { bottom: 40px; left: 50%; transform: translateX(-50%); width: 420px; }

/* ✨ 发光文字 */
h1, h2 {
  margin: 0;
  color: #1df2ff;
  text-shadow: 0 0 10px #1df2ff;
}

p {
  font-size: 14px;
  opacity: 0.85;
}

/* ⚡ 按钮 */
button {
  margin-top: 10px;
  padding: 10px 14px;
  background: transparent;
  border: 1px solid #1df2ff;
  color: #1df2ff;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #1df2ff22;
  box-shadow: 0 0 20px #1df2ff;
}
</style>
</head>

<body>

<div class="stars"></div>

<!-- 🛰️ 中央空间站 -->
<div class="station"></div>

<!-- 📡 左侧任务 -->
<div class="panel left">
  <h2>MISSION CONTROL</h2>
  <p>• Lunar docking sequence ready</p>
  <p>• Oxygen system stable</p>
  <p>• Communication: LINKED</p>
  <button onclick="alert('Launching simulation...')">Run Simulation</button>
</div>

<!-- 🧪 右侧数据 -->
<div class="panel right">
  <h2>ORBIT DATA</h2>
  <p>Altitude: 408 km</p>
  <p>Speed: 7.66 km/s</p>
  <p>Status: STABLE ORBIT</p>
</div>

<!-- 🌍 底部地球信息 -->
<div class="panel bottom">
  <h2>EARTH VIEW STATUS</h2>
  <p>Signal delay: 1.3 sec</p>
  <p>Trajectory: Earth → Moon transfer orbit active</p>
</div>

</body>
</html>
