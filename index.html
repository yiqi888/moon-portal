<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moon Portal 🌕</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
      background: radial-gradient(circle at center, #0b0f2a, #000);
    }

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('https://upload.wikimedia.org/wikipedia/commons/0/02/Snow_stars_space.jpg');
      background-size: cover;
      opacity: 0.3;
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      top: 20vh;
    }

    h1 {
      font-size: 60px;
      margin: 0;
      letter-spacing: 2px;
    }

    p {
      font-size: 20px;
      opacity: 0.8;
    }

    .moon {
      width: 180px;
      height: 180px;
      margin: 40px auto;
      border-radius: 50%;
      background: url('https://upload.wikimedia.org/wikipedia/commons/9/99/FullMoon2010.jpg');
      background-size: cover;
      box-shadow: 0 0 60px rgba(255,255,255,0.4);
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .btn {
      padding: 12px 24px;
      background: white;
      color: black;
      border-radius: 8px;
      display: inline-block;
      margin-top: 20px;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="stars"></div>

  <div class="container">
    <h1>Moon Exploration Portal 🌕</h1>
    <p>Humanity’s next step: back to the Moon</p>

    <div class="moon"></div>

    <a class="btn" href="#">Explore Mission Data</a>
  </div>
</body>
</html>
